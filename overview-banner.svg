<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">cocosoys pixel RPG profile banner</title>
  <desc id="desc">A pixel-art RPG style GitHub profile banner for cocosoys.</desc>
  <style>
    .pixel-title { font: 900 74px "Consolas", "Segoe UI", monospace; fill: #f7f4ff; letter-spacing: 2px; }
    .pixel-label { font: 800 22px "Consolas", "Segoe UI", monospace; fill: #ffd66b; letter-spacing: 1px; }
    .pixel-small { font: 700 17px "Consolas", "Segoe UI", monospace; fill: #a7fff1; letter-spacing: 1px; }
    .pixel-tiny { font: 700 13px "Consolas", "Segoe UI", monospace; fill: #f7f4ff; letter-spacing: 1px; }
    .frame { stroke: #f7f4ff; stroke-width: 6; shape-rendering: crispEdges; }
    .inner { stroke: #533b9b; stroke-width: 4; shape-rendering: crispEdges; }
    .grid { shape-rendering: crispEdges; }
    .blink { animation: blink 1.2s steps(2, end) infinite; }
    .float { animation: float 3.2s ease-in-out infinite; }
    .scan { animation: scan 4.2s linear infinite; }
    .pulse { animation: pulse 1.8s ease-in-out infinite; }
    @keyframes blink { 0%, 48% { opacity: 1; } 49%, 100% { opacity: .25; } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes scan { 0% { transform: translateY(-120px); opacity: 0; } 20%, 70% { opacity: .42; } 100% { transform: translateY(340px); opacity: 0; } }
    @keyframes pulse { 0%, 100% { opacity: .42; } 50% { opacity: 1; } }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#171329"/>
      <stop offset="0.48" stop-color="#271a58"/>
      <stop offset="1" stop-color="#111d35"/>
    </linearGradient>
    <linearGradient id="screen" x1="110" y1="78" x2="1034" y2="295" gradientUnits="userSpaceOnUse">
      <stop stop-color="#31206d"/>
      <stop offset="1" stop-color="#123b5b"/>
    </linearGradient>
    <linearGradient id="crystal" x1="90" y1="94" x2="227" y2="234" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff6bd6"/>
      <stop offset="0.5" stop-color="#8d72ff"/>
      <stop offset="1" stop-color="#32ffe1"/>
    </linearGradient>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#493d83" stroke-width="1" opacity=".55" class="grid"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>
  <rect width="1200" height="360" fill="url(#grid)" opacity=".55"/>
  <rect x="28" y="28" width="1144" height="304" fill="none" class="frame"/>
  <rect x="44" y="44" width="1112" height="272" fill="none" class="inner"/>
  <rect x="58" y="62" width="1084" height="236" fill="url(#screen)" opacity=".94"/>
  <rect class="scan" x="58" y="62" width="1084" height="46" fill="#9bfff2" opacity=".22"/>

  <g class="float" filter="url(#glow)">
    <path d="M124 94H212V116H234V204H212V226H124V204H102V116H124V94Z" fill="url(#crystal)"/>
    <path d="M146 130H190V146H206V190H190V206H146V190H130V146H146V130Z" fill="#171329"/>
    <rect x="158" y="145" width="20" height="46" fill="#f7f4ff"/>
    <rect x="182" y="145" width="16" height="16" fill="#f7f4ff"/>
    <rect x="182" y="175" width="16" height="16" fill="#f7f4ff"/>
  </g>

  <text x="270" y="128" class="pixel-label">PLAYER FILE</text>
  <text x="270" y="206" class="pixel-title">cocosoys</text>
  <text x="274" y="252" class="pixel-small">&gt; Pixel RPG menu / real repos / QR contact</text>

  <g>
    <rect x="835" y="86" width="250" height="44" fill="#211849" stroke="#ff6bd6" stroke-width="4" shape-rendering="crispEdges"/>
    <rect x="835" y="151" width="250" height="44" fill="#211849" stroke="#32ffe1" stroke-width="4" shape-rendering="crispEdges"/>
    <rect x="835" y="216" width="250" height="44" fill="#211849" stroke="#ffd66b" stroke-width="4" shape-rendering="crispEdges"/>
    <text x="872" y="115" class="pixel-tiny">SKILLS</text>
    <text x="872" y="180" class="pixel-tiny">PROJECTS</text>
    <text x="872" y="245" class="pixel-tiny">CONTACT</text>
    <rect class="blink" x="849" y="101" width="12" height="12" fill="#ffd66b"/>
    <rect class="pulse" x="849" y="166" width="12" height="12" fill="#32ffe1"/>
    <rect class="blink" x="849" y="231" width="12" height="12" fill="#ff6bd6"/>
  </g>

  <g opacity=".9">
    <rect class="blink" x="92" y="264" width="10" height="10" fill="#ffd66b"/>
    <rect class="pulse" x="1110" y="73" width="10" height="10" fill="#32ffe1"/>
    <rect class="blink" x="755" y="82" width="8" height="8" fill="#ff6bd6"/>
    <rect class="pulse" x="1010" y="285" width="8" height="8" fill="#ffd66b"/>
  </g>
</svg>
