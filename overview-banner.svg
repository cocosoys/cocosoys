<svg width="1100" height="280" viewBox="0 0 1100 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">cocosoys contact overview banner</title>
  <desc id="desc">A polished GitHub profile banner for cocosoys with contact overview visual styling.</desc>
  <style>
    .title { font: 800 72px "Segoe UI", Arial, sans-serif; fill: #17201c; }
    .label { font: 700 21px "Segoe UI", Arial, sans-serif; fill: #0a5f50; }
    .small { font: 600 17px "Segoe UI", Arial, sans-serif; fill: #5d6862; }
    .chip { font: 700 15px "Segoe UI", Arial, sans-serif; fill: #17201c; }
    .stroke { stroke: rgba(23, 32, 28, 0.12); stroke-width: 1; }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1100" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f7f8f3"/>
      <stop offset="0.48" stop-color="#eef7ef"/>
      <stop offset="1" stop-color="#fff0eb"/>
    </linearGradient>
    <linearGradient id="accent" x1="108" y1="49" x2="322" y2="223" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f8b6f"/>
      <stop offset="1" stop-color="#2a6f9d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#17201c" flood-opacity="0.14"/>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#dfe5dd" stroke-width="1" opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="1100" height="280" rx="22" fill="url(#bg)"/>
  <rect width="1100" height="280" rx="22" fill="url(#grid)" opacity="0.65"/>
  <circle cx="955" cy="62" r="94" fill="#0f8b6f" opacity="0.10"/>
  <circle cx="1014" cy="223" r="118" fill="#d8653a" opacity="0.12"/>
  <rect x="72" y="58" width="142" height="142" rx="22" fill="url(#accent)" filter="url(#shadow)"/>
  <text x="144" y="156" text-anchor="middle" class="title" fill="#ffffff">c</text>
  <text x="252" y="107" class="label">GitHub Profile</text>
  <text x="250" y="169" class="title">cocosoys</text>
  <text x="255" y="210" class="small">WeChat / QQ contact overview</text>
  <g filter="url(#shadow)">
    <rect x="748" y="73" width="262" height="52" rx="12" fill="#ffffff" class="stroke"/>
    <rect x="748" y="151" width="262" height="52" rx="12" fill="#ffffff" class="stroke"/>
  </g>
  <circle cx="779" cy="99" r="11" fill="#0f8b6f"/>
  <text x="804" y="105" class="chip">WeChat</text>
  <circle cx="779" cy="177" r="11" fill="#2a6f9d"/>
  <text x="804" y="183" class="chip">QQ</text>
</svg>
