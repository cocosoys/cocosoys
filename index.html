<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="cocosoys 的个人 overview，面向合作沟通与作品关注。"
    />
    <title>cocosoys | Personal Overview</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header" aria-label="页面导航">
      <a class="brand" href="#top" aria-label="返回顶部">
        <span class="brand-mark">c</span>
        <span>cocosoys</span>
      </a>
      <nav class="nav-links" aria-label="主要导航">
        <a href="#contact">联系</a>
      </nav>
    </header>

    <main id="top">
      <section class="section contact-section" id="contact" aria-labelledby="contact-title">
        <div class="contact-copy">
          <p class="section-label">联系我</p>
          <h2 id="contact-title">扫码添加，开始一次具体的合作沟通</h2>
          <p>
            微信适合快速沟通与后续协作，QQ 适合文件传递、社群联系或长期交流。
            二维码默认折叠，按需展开。
          </p>
        </div>

        <div class="contact-accordion" data-accordion>
          <article class="contact-card" data-card>
            <button
              class="contact-toggle"
              type="button"
              id="wechat-toggle"
              aria-expanded="false"
              aria-controls="wechat-panel"
              data-toggle
            >
              <span>
                <strong>微信</strong>
                <small>适合合作沟通</small>
              </span>
              <svg aria-hidden="true" class="chevron" viewBox="0 0 24 24">
                <path d="m6 9 6 6 6-6" />
              </svg>
            </button>
            <div
              class="qr-panel"
              id="wechat-panel"
              role="region"
              aria-labelledby="wechat-toggle"
              data-panel
            >
              <div class="qr-wrap">
                <img src="wx.png" alt="微信二维码" loading="eager" decoding="async" />
              </div>
              <p>展开后扫码添加微信。</p>
            </div>
          </article>

          <article class="contact-card" data-card>
            <button
              class="contact-toggle"
              type="button"
              id="qq-toggle"
              aria-expanded="false"
              aria-controls="qq-panel"
              data-toggle
            >
              <span>
                <strong>QQ</strong>
                <small>适合资料交流</small>
              </span>
              <svg aria-hidden="true" class="chevron" viewBox="0 0 24 24">
                <path d="m6 9 6 6 6-6" />
              </svg>
            </button>
            <div
              class="qr-panel"
              id="qq-panel"
              role="region"
              aria-labelledby="qq-toggle"
              data-panel
            >
              <div class="qr-wrap">
                <img src="qq.png" alt="QQ 二维码" loading="eager" decoding="async" />
              </div>
              <p>展开后扫码添加 QQ。</p>
            </div>
          </article>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>cocosoys · personal overview</p>
      <a href="#top">返回顶部</a>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
